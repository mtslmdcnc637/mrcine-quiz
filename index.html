            </p>
            <a href="?start=true" style="display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:18px 40px;border:none;border-radius:10px;background:linear-gradient(135deg,#d4a853 0%,#c49a3e 100%);color:#0a0a0b;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.03em;cursor:pointer;box-shadow:0 0 30px rgba(212,168,83,0.3);text-decoration:none">

            <p style="margin-top:12px;color:#a09a90;font-size:0.7rem;font-family:'DM Sans',sans-serif">Se não carregar, <a href="?reload=true" style="color:#d4a853">atualize a página</a></p>
